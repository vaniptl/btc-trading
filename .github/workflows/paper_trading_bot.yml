name: Paper Trading Bot — Cron

# WHY THIS PATTERN:
# GitHub Actions kills jobs after ~6 minutes for free tier.
# A "while True" loop inside the job causes timeout/kill.
# Solution: run ONE signal check per job invocation.
# The cron schedule (every 5 min) is the "loop" — Actions restarts the job.
# State (open trades, account value) persists via GitHub Actions cache.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes = the loop

jobs:
  paper-signal-check:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # hard kill at 4min, well within 5min cadence

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-paper-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-paper-

      - name: Install deps
        run: |
          pip install --quiet requests pandas numpy feedparser vaderSentiment

      - name: Restore trading state
        uses: actions/cache@v4
        with:
          path: paper_trading/
          key: paper-state-v2-${{ github.ref }}
          restore-keys: paper-state-v2-

      - name: Create dirs
        run: mkdir -p paper_trading data

      - name: Run single signal check
        timeout-minutes: 3
        env:
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS:     ${{ secrets.TELEGRAM_CHAT_IDS }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
          PAPER_CAPITAL:         "10000"
          PAPER_CHECK_INTERVAL:  "60"
          PAPER_MAX_DAILY_LOSS:  "0.05"
          PAPER_MAX_CONCURRENT:  "2"
          PAPER_COOLDOWN_LOSSES: "3"
          PAPER_COOLDOWN_HOURS:  "4"
          PAPER_KELLY_FRACTION:  "0.25"
          ENABLE_SHORTS:         "true"
          MIN_SCORE:             "4.0"
          # Tells the bot to run ONE check and exit cleanly
          PAPER_SINGLE_SHOT:     "true"
        run: |
          cd ${{ github.workspace }}
          python paper_trading/paper_bot.py

      - name: Save trading state
        if: always()
        uses: actions/cache@v4
        with:
          path: paper_trading/
          key: paper-state-v2-${{ github.ref }}
