name: BTC Signal Hourly Cron

on:
  schedule:
    - cron: "0 * * * *"   # every hour at :00
  workflow_dispatch:        # also allow manual trigger from GitHub UI

jobs:
  signal_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run signal check & send Telegram alert
        env:
          CRYPTOCOMPARE_API_KEY:  ${{ secrets.CRYPTOCOMPARE_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS:      ${{ secrets.TELEGRAM_CHAT_IDS }}
          GOOGLE_SHEETS_WEBHOOK:  ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
          MIN_SCORE:              ${{ vars.MIN_SCORE || '5.0' }}
          MIN_CATEGORIES:         ${{ vars.MIN_CATEGORIES || '2' }}
          ATR_SL_MULT:            ${{ vars.ATR_SL_MULT || '2.0' }}
          ATR_TP_MULT:            ${{ vars.ATR_TP_MULT || '4.0' }}
          TREND_REQUIRED:         ${{ vars.TREND_REQUIRED || 'true' }}
          ENABLE_SHORTS:          ${{ vars.ENABLE_SHORTS || 'true' }}
          MEMORY_FILE:            btc_backtest_memory.json
        run: python cron/hourly_signal.py

      - name: Upload memory file as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-memory
          path: btc_backtest_memory.json
          retention-days: 90
          overwrite: true
