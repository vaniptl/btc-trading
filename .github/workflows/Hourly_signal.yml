name: Hourly BTC Signal Check

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  signal-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install requests pandas numpy python-telegram-bot
          pip install feedparser vaderSentiment

      - name: Run hourly signal check
        env:
          CRYPTOCOMPARE_API_KEY:  ${{ secrets.CRYPTOCOMPARE_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS:      ${{ secrets.TELEGRAM_CHAT_IDS }}
          GOOGLE_SHEETS_WEBHOOK:  ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
          ENABLE_SHORTS:          "true"
          MIN_SCORE:              "5.0"
          MIN_CATEGORIES:         "2"
          TREND_REQUIRED:         "true"
          ATR_SL_MULT:            "2.0"
          ATR_TP_MULT:            "4.0"
          # Intelligence layer thresholds
          CONFIDENCE_THRESHOLD:   "55.0"
          MAX_DAILY_LOSS_PCT:     "0.05"
          MAX_CONCURRENT_TRADES:  "2"
        run: python cron/hourly_signal.py
